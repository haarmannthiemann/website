      align-items: center;

      gap: 1rem;
      margin-bottom: 1.5rem;
      margin-top: 10rem;
    }

    .contact-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #e7dcce;
      flex-shrink: 0;
    }

    .contact-info {
      text-align: left;

    }

    .projects {
      width: 100%;
      border: none;
      border-radius: 0;
      padding: 0.8rem 0.2rem 0.2rem;
      background: #f7f2e9;
      text-align: left;
      box-shadow: none;
      margin: 0 auto;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border-radius: 0;
      width: 100%;
    }

    .projects h3 {
      margin: 0;
      font-size: 1.5rem;
      margin-bottom: 0.6rem;
      color: #82746e;
      font-weight: 100;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      width: 100%;
    }

    .project-grid a.tile {
      display: block;
      aspect-ratio: 1 / 1;
      width: 100%;
      min-height: 160px;
      overflow: hidden;
      border-radius: 0;
      background: #f7f2e9;
      border: none;
      box-shadow: none;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .project-grid a.tile:hover {
      transform: scale(1.02);
    }

    .project-grid a.tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 900px) {
      .project-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 0.4rem;
      }
    }

    @media (max-width: 600px) {
      .project-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.3rem;
      }

      main {
        padding: 0.8rem;
      }

      .hero {
        gap: 0.7rem;
      }
    }

    @media (max-width: 480px) {
      .project-grid {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }

      .projects {
        padding: 0.7rem 0.1rem 0.1rem;
      }
    }


    h1,
    h2,
    h3 {
      color: #82746e;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 100;
      text-transform: none;
      font-variant: normal;
      letter-spacing: 0.05em;
    }

    h2 {

      font-size: 1.1rem;
      font-weight: 100;
