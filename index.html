    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f4ecde;

      color: #5b4a38;
      font-family: "DM Sans", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 900px);
      padding: 1rem;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    .profile {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #d8c7b1;
      margin-bottom: 1.2rem;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .hero-content {
      max-width: 650px;
      width: 100%;
      text-align: center;
    }

    .hero-content h1 {
      margin-top: 0;
      margin-bottom: 0.25rem;
      border-bottom: 1px solid #d8c7b1;
      padding-bottom: 0.3rem;
      padding-left: 0.1rem;
      padding-right: 0.1rem;
    }

    .hero-avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #d8c7b1;
      flex-shrink: 0;
    }

    .projects {
      width: 100%;
      max-width: 840px;
      border: none;
      border-radius: 0;
      padding: 0.8rem 0.2rem 0.2rem;
      background: #f8f1e6;
      text-align: left;
      box-shadow: none;
      margin: 0 auto;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border-radius: 0;
      width: 100%;
    }

    .projects h3 {
      margin: 0;
      font-size: 1rem;
      margin-bottom: 0.6rem;
      color: #5b4a38;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      width: 100%;
    }

    .project-grid a.tile {
      display: block;
      aspect-ratio: 1 / 1;
      width: 100%;
      min-height: 160px;
      overflow: hidden;
      border-radius: 0;
      background: #eee;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .project-grid a.tile:hover {
      transform: scale(1.02);
    }

    .project-grid a.tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 900px) {
      .project-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 0.4rem;
      }
    }

    @media (max-width: 600px) {
      .project-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.3rem;
      }

      main {
        padding: 0.8rem;
      }

      .hero {
        gap: 0.7rem;
      }
    }

    @media (max-width: 480px) {
      .project-grid {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }

      .projects {
        padding: 0.7rem 0.1rem 0.1rem;
      }
    }

    .hero-content {
      max-width: 520px;
      text-align: left;
    }

    .hero-content h1 {
      margin-top: 0;
      margin-bottom: 0.25rem;
    }

    .profile img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #d8c7b1;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      text-transform: none;
      font-variant: small-caps;
      letter-spacing: 0.05em;
    }

    p {
      margin: 1rem 0;
    }

    .kontakt {
      margin-top: 1.5rem;
      text-align: left;
      display: inline-block;
      width: 100%;
      max-width: 500px;
    }

    .kontakt h2 {
      margin: 0.2rem 0 0.8rem;
      font-size: 1.1rem;
    }

    .kontakt p {
      margin: 0;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .impressum {
      margin-top: 3rem;
      padding-top: 0.7rem;
      border-top: 1px solid #d8c7b1;
      font-size: 0.7rem;
      color: #7a6a58;
      text-align: center;
      opacity: 0.85;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
    }

    .contact-item svg {
      width: 1rem;
      height: 1rem;
      stroke: #5b4a38;
      fill: none;
      stroke-width: 2;
    }

    a {
      color: #5b4a38;
      text-decoration: none;
    }

    a:hover {
      text-decoration: none;
    }
